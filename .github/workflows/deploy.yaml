# 이름 설정
name: ChatBot Dev CI/CD

# on: 실행 트리거 역할 : 언제 이 작업을 수행할 것인가
# main 브랜치에 push하면 CI/CD 실행
on:
  push:
    branches:
      - main
  workflow_dispatch:
# 작업 환경 설정
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          arguments: build -x test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatbot-jar
          path: build/libs/*.jar
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: chatbot-jar

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "*.jar"
          target: "/home/ubuntu/NoticeChatbot/build/libs"

      - name: Execute Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            sudo fuser -k 8080/tcp || true
            sleep 5
            nohup java -jar /home/ubuntu/NoticeChatbot/build/libs/*.jar > /home/ubuntu/NoticeChatbot/output.log 2>&1 &







